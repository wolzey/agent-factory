<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Factory</title>
  <style>
    :root {
      --accent-color: #ff00ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

    /* Tooltip overlay */
    #tooltip {
      display: none;
      position: fixed;
      background: rgba(10, 10, 26, 0.95);
      border: 2px solid var(--accent-color);
      border-radius: 4px;
      padding: 8px 12px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent-color) 30%, transparent);
      max-width: 300px;
    }
    #tooltip .tooltip-name {
      color: #00ffff;
      font-weight: bold;
      font-size: 14px;
    }
    #tooltip .tooltip-detail {
      color: #aaa;
      margin-top: 4px;
    }
    #tooltip .tooltip-tool {
      color: var(--accent-color);
      margin-top: 2px;
    }
    #tooltip .tooltip-task {
      color: #66ff99;
      margin-top: 4px;
      font-size: 11px;
    }
    #tooltip .tooltip-prompt {
      color: #888;
      margin-top: 2px;
      font-style: italic;
      font-size: 10px;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px 14px;
      color: #666;
      font-family: monospace;
      font-size: 11px;
      z-index: 999;
    }
    #hud .hud-title {
      color: var(--accent-color);
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 0 8px color-mix(in srgb, var(--accent-color) 50%, transparent);
    }
    #hud .hud-stat {
      color: #00ffff;
    }

    /* Chat Overlay */
    #chat-overlay {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 260px;
      background: rgba(10, 10, 26, 0.80);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 11px;
      z-index: 999;
      transition: opacity 0.8s ease-out;
    }
    #chat-overlay.chat-visible {
      opacity: 1;
      pointer-events: auto;
    }
    #chat-overlay.chat-hidden {
      opacity: 0;
      pointer-events: none;
    }
    #chat-overlay .chat-messages {
      max-height: 72px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    #chat-overlay .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    #chat-overlay .chat-messages::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px;
    }
    #chat-overlay .chat-msg {
      line-height: 1.5;
      color: #ccc;
      word-break: break-word;
    }
    #chat-overlay .chat-name {
      color: #00ffff;
      font-weight: bold;
    }

    /* Login button */
    #login-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 14px;
      color: var(--accent-color);
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      z-index: 999;
      transition: border-color 0.2s;
    }
    #login-btn:hover {
      border-color: var(--accent-color);
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent-color) 30%, transparent);
    }

    /* Login modal */
    #login-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1100;
    }
    #login-modal .login-box {
      background: rgba(10, 10, 26, 0.95);
      border: 2px solid var(--accent-color);
      border-radius: 6px;
      padding: 20px 24px;
      width: 360px;
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent-color) 30%, transparent);
    }
    #login-modal .login-title {
      color: var(--accent-color);
      font-family: monospace;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    #login-modal .login-hint {
      color: #666;
      font-family: monospace;
      font-size: 11px;
      margin-bottom: 12px;
    }
    #login-modal .login-hint code {
      color: #00ffff;
      background: rgba(0, 255, 255, 0.1);
      padding: 1px 4px;
      border-radius: 2px;
    }
    #login-modal .login-token-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px 10px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      outline: none;
    }
    #login-modal .login-token-input:focus {
      border-color: var(--accent-color);
    }
    #login-modal .login-error {
      color: #ff4444;
      font-family: monospace;
      font-size: 11px;
      margin-top: 6px;
      min-height: 16px;
    }
    #login-modal .login-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    #login-modal .login-actions button {
      flex: 1;
      padding: 6px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #444;
    }
    #login-modal .login-submit {
      background: var(--accent-color);
      color: #000;
      font-weight: bold;
      border-color: var(--accent-color);
    }
    #login-modal .login-cancel {
      background: transparent;
      color: #888;
    }

    /* User badge */
    #user-badge {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 14px;
      font-family: monospace;
      font-size: 12px;
      z-index: 999;
    }
    #user-badge .badge-name {
      color: #00ffff;
      font-weight: bold;
    }
    #user-badge .badge-logout {
      color: #666;
      margin-left: 10px;
      cursor: pointer;
      font-size: 10px;
    }
    #user-badge .badge-logout:hover {
      color: #ff4444;
    }

    /* Command input */
    #command-input {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      display: flex;
      align-items: center;
      background: rgba(10, 10, 26, 0.90);
      border: 1px solid var(--accent-color);
      border-radius: 4px;
      padding: 4px 8px;
      font-family: monospace;
      font-size: 12px;
      z-index: 999;
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent-color) 20%, transparent);
    }
    #command-input .prompt-char {
      color: var(--accent-color);
      margin-right: 6px;
      font-weight: bold;
    }
    #command-input input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
    }
    #command-input input::placeholder {
      color: #555;
    }

    /* Command suggestions */
    #command-suggestions {
      display: none;
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      max-height: 180px;
      overflow-y: auto;
      background: rgba(10, 10, 26, 0.95);
      border: 1px solid var(--accent-color);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      font-family: monospace;
      font-size: 12px;
      z-index: 1000;
      box-shadow: 0 -4px 12px color-mix(in srgb, var(--accent-color) 15%, transparent);
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    #command-suggestions::-webkit-scrollbar { width: 4px; }
    #command-suggestions::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
    #command-suggestions .suggestion {
      padding: 5px 10px;
      color: #aaa;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
    }
    #command-suggestions .suggestion:hover,
    #command-suggestions .suggestion.active {
      background: color-mix(in srgb, var(--accent-color) 15%, transparent);
      color: #fff;
    }
    #command-suggestions .suggestion .cmd { color: #00ffff; }
    #command-suggestions .suggestion.active .cmd { color: #fff; }
    #command-suggestions .suggestion .desc { color: #666; font-size: 11px; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="tooltip">
    <div class="tooltip-name"></div>
    <div class="tooltip-detail"></div>
    <div class="tooltip-tool"></div>
    <div class="tooltip-task"></div>
    <div class="tooltip-prompt"></div>
  </div>
  <div id="hud">
    <div class="hud-title">AGENT FACTORY</div>
    <div>Agents: <span class="hud-stat" id="hud-agents">0</span></div>
    <div>Connected: <span class="hud-stat" id="hud-connected">--</span></div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
