<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Factory</title>
  <style>
    :root {
      --accent-color: #ff00ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
    #game-container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

    /* Tooltip overlay */
    #tooltip {
      display: none;
      position: fixed;
      background: rgba(10, 10, 26, 0.95);
      border: 2px solid var(--accent-color);
      border-radius: 4px;
      padding: 8px 12px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent-color) 30%, transparent);
      max-width: 300px;
    }
    #tooltip .tooltip-name {
      color: #00ffff;
      font-weight: bold;
      font-size: 14px;
    }
    #tooltip .tooltip-detail {
      color: #aaa;
      margin-top: 4px;
    }
    #tooltip .tooltip-tool {
      color: var(--accent-color);
      margin-top: 2px;
    }
    #tooltip .tooltip-task {
      color: #66ff99;
      margin-top: 4px;
      font-size: 11px;
    }
    #tooltip .tooltip-prompt {
      color: #888;
      margin-top: 2px;
      font-style: italic;
      font-size: 10px;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px 14px;
      color: #666;
      font-family: monospace;
      font-size: 11px;
      z-index: 999;
    }
    #hud .hud-title {
      color: var(--accent-color);
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 0 8px color-mix(in srgb, var(--accent-color) 50%, transparent);
    }
    #hud .hud-stat {
      color: #00ffff;
    }

    /* Chat Overlay */
    #chat-overlay {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 260px;
      background: rgba(10, 10, 26, 0.80);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 11px;
      z-index: 999;
      transition: opacity 0.8s ease-out;
    }
    #chat-overlay.chat-visible {
      opacity: 1;
      pointer-events: auto;
    }
    #chat-overlay.chat-hidden {
      opacity: 0;
      pointer-events: none;
    }
    #chat-overlay .chat-messages {
      max-height: 72px;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    #chat-overlay .chat-messages::-webkit-scrollbar {
      width: 4px;
    }
    #chat-overlay .chat-messages::-webkit-scrollbar-thumb {
      background: #444;
      border-radius: 2px;
    }
    #chat-overlay .chat-msg {
      line-height: 1.5;
      color: #ccc;
      word-break: break-word;
    }
    #chat-overlay .chat-name {
      color: #00ffff;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="tooltip">
    <div class="tooltip-name"></div>
    <div class="tooltip-detail"></div>
    <div class="tooltip-tool"></div>
    <div class="tooltip-task"></div>
    <div class="tooltip-prompt"></div>
  </div>
  <div id="hud">
    <div class="hud-title">AGENT FACTORY</div>
    <div>Agents: <span class="hud-stat" id="hud-agents">0</span></div>
    <div>Connected: <span class="hud-stat" id="hud-connected">--</span></div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
