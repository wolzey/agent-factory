<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Factory</title>
  <style>
    :root {
      --accent-color: #ff00ff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
    body { display: flex; }
    #game-container {
      flex: 1;
      height: 100vh;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas { image-rendering: pixelated; image-rendering: crisp-edges; }

    /* Tooltip overlay */
    #tooltip {
      display: none;
      position: fixed;
      background: rgba(10, 10, 26, 0.95);
      border: 2px solid var(--accent-color);
      border-radius: 4px;
      padding: 8px 12px;
      color: #fff;
      font-family: monospace;
      font-size: 12px;
      pointer-events: none;
      z-index: 1000;
      box-shadow: 0 0 12px color-mix(in srgb, var(--accent-color) 30%, transparent);
      max-width: 300px;
    }
    #tooltip .tooltip-name {
      color: #00ffff;
      font-weight: bold;
      font-size: 14px;
    }
    #tooltip .tooltip-detail {
      color: #aaa;
      margin-top: 4px;
    }
    #tooltip .tooltip-tool {
      color: var(--accent-color);
      margin-top: 2px;
    }
    #tooltip .tooltip-task {
      color: #66ff99;
      margin-top: 4px;
      font-size: 11px;
    }
    #tooltip .tooltip-prompt {
      color: #888;
      margin-top: 2px;
      font-style: italic;
      font-size: 10px;
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* HUD */
    #hud {
      position: fixed;
      top: 12px;
      right: 12px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px 14px;
      color: #666;
      font-family: monospace;
      font-size: 11px;
      z-index: 999;
    }
    #hud .hud-title {
      color: var(--accent-color);
      font-size: 13px;
      font-weight: bold;
      text-shadow: 0 0 8px color-mix(in srgb, var(--accent-color) 50%, transparent);
    }
    #hud .hud-stat {
      color: #00ffff;
    }

    /* Chat Panel — unified block with messages + input */
    #chat-panel {
      position: relative;
      width: 340px;
      height: 100vh;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      background: rgba(6, 6, 18, 0.95);
      border-left: 1px solid #2a2a3a;
      font-family: monospace;
      font-size: 11px;
      z-index: 999;
      overflow: hidden;
    }
    #chat-panel .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 10px;
      border-bottom: 1px solid #1a1a2e;
      color: #555;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    #chat-panel .chat-header .chat-label {
      color: var(--accent-color);
      font-weight: bold;
    }
    #chat-panel .chat-messages {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 6px 0;
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
    }
    #chat-panel .chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-panel .chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    #chat-panel .chat-empty {
      color: #333;
      text-align: center;
      padding: 20px 10px;
      font-size: 10px;
    }
    #chat-panel .chat-msg {
      padding: 3px 10px;
      line-height: 1.6;
      color: #bbb;
      word-break: break-word;
      border-left: 2px solid transparent;
      transition: background 0.15s;
    }
    #chat-panel .chat-msg:hover {
      background: rgba(255, 255, 255, 0.03);
    }
    #chat-panel .chat-msg.system-msg {
      color: #666;
      font-style: italic;
      border-left-color: #333;
      background: rgba(255, 255, 255, 0.015);
      padding: 4px 10px;
      white-space: pre-wrap;
    }
    #chat-panel .chat-msg .chat-time {
      color: #333;
      font-size: 9px;
      margin-right: 6px;
    }
    #chat-panel .chat-msg .chat-name {
      font-weight: bold;
      margin-right: 1px;
    }
    #chat-panel .chat-msg .chat-name.user-color-0 { color: #00ffff; }
    #chat-panel .chat-msg .chat-name.user-color-1 { color: #ff66aa; }
    #chat-panel .chat-msg .chat-name.user-color-2 { color: #66ff88; }
    #chat-panel .chat-msg .chat-name.user-color-3 { color: #ffaa44; }
    #chat-panel .chat-msg .chat-name.user-color-4 { color: #aa88ff; }
    #chat-panel .chat-msg .chat-name.user-color-5 { color: #ff6666; }
    #chat-panel .chat-msg .chat-name.user-color-6 { color: #44ddff; }
    #chat-panel .chat-msg .chat-name.user-color-7 { color: #ffff66; }
    #chat-panel .chat-msg .chat-text { color: #ccc; }
    #chat-panel .chat-msg .chat-text .hl-cmd { color: var(--accent-color); font-weight: bold; }
    #chat-panel .chat-msg .chat-text .hl-emote { color: #ffaa44; }
    #chat-panel .chat-msg .chat-text .hl-mention { color: #00ffff; font-weight: bold; }
    #chat-panel .chat-input-row {
      display: flex;
      align-items: center;
      padding: 6px 10px;
      border-top: 1px solid #1a1a2e;
      background: rgba(0, 0, 0, 0.2);
    }
    #chat-panel .chat-input-row:focus-within {
      border-top-color: var(--accent-color);
      box-shadow: inset 0 1px 8px color-mix(in srgb, var(--accent-color) 10%, transparent);
    }
    #chat-panel .chat-input-row .prompt-char {
      color: var(--accent-color);
      margin-right: 6px;
      font-weight: bold;
      font-size: 13px;
    }
    #chat-panel .chat-input-row input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #ddd;
      font-family: monospace;
      font-size: 12px;
    }
    #chat-panel .chat-input-row input::placeholder { color: #444; }
    #chat-panel .chat-input-row .hint {
      color: #333;
      font-size: 9px;
      margin-left: 6px;
      white-space: nowrap;
    }
    #chat-panel .chat-login-hint {
      padding: 6px 10px;
      border-top: 1px solid #1a1a2e;
      background: rgba(0, 0, 0, 0.2);
      color: #444;
      font-size: 10px;
      text-align: center;
    }
    #chat-panel .chat-login-hint a {
      color: var(--accent-color);
      cursor: pointer;
      text-decoration: none;
    }
    #chat-panel .chat-login-hint a:hover { text-decoration: underline; }

    /* Login button */
    #login-btn {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 14px;
      color: var(--accent-color);
      font-family: monospace;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      z-index: 999;
      transition: border-color 0.2s;
    }
    #login-btn:hover {
      border-color: var(--accent-color);
      box-shadow: 0 0 8px color-mix(in srgb, var(--accent-color) 30%, transparent);
    }

    /* Login modal */
    #login-modal {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.6);
      z-index: 1100;
    }
    #login-modal .login-box {
      background: rgba(10, 10, 26, 0.95);
      border: 2px solid var(--accent-color);
      border-radius: 6px;
      padding: 20px 24px;
      width: 360px;
      box-shadow: 0 0 20px color-mix(in srgb, var(--accent-color) 30%, transparent);
    }
    #login-modal .login-title {
      color: var(--accent-color);
      font-family: monospace;
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 8px;
    }
    #login-modal .login-hint {
      color: #666;
      font-family: monospace;
      font-size: 11px;
      margin-bottom: 12px;
    }
    #login-modal .login-hint code {
      color: #00ffff;
      background: rgba(0, 255, 255, 0.1);
      padding: 1px 4px;
      border-radius: 2px;
    }
    #login-modal .login-token-input {
      width: 100%;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid #444;
      border-radius: 4px;
      padding: 8px 10px;
      color: #fff;
      font-family: monospace;
      font-size: 13px;
      outline: none;
    }
    #login-modal .login-token-input:focus {
      border-color: var(--accent-color);
    }
    #login-modal .login-error {
      color: #ff4444;
      font-family: monospace;
      font-size: 11px;
      margin-top: 6px;
      min-height: 16px;
    }
    #login-modal .login-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    #login-modal .login-actions button {
      flex: 1;
      padding: 6px 12px;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #444;
    }
    #login-modal .login-submit {
      background: var(--accent-color);
      color: #000;
      font-weight: bold;
      border-color: var(--accent-color);
    }
    #login-modal .login-cancel {
      background: transparent;
      color: #888;
    }

    /* User badge */
    #user-badge {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(10, 10, 26, 0.85);
      border: 1px solid #333;
      border-radius: 4px;
      padding: 6px 14px;
      font-family: monospace;
      font-size: 12px;
      z-index: 999;
    }
    #user-badge .badge-name {
      color: #00ffff;
      font-weight: bold;
    }
    #user-badge .badge-logout {
      color: #666;
      margin-left: 10px;
      cursor: pointer;
      font-size: 10px;
    }
    #user-badge .badge-logout:hover {
      color: #ff4444;
    }

    /* Command suggestions — floats above the chat panel */
    #command-suggestions {
      display: none;
      position: fixed;
      max-height: 200px;
      overflow-y: auto;
      background: rgba(6, 6, 18, 0.97);
      border: 1px solid var(--accent-color);
      border-radius: 6px;
      font-family: monospace;
      font-size: 11px;
      z-index: 1001;
      box-shadow: 0 -4px 16px color-mix(in srgb, var(--accent-color) 20%, transparent);
      scrollbar-width: thin;
      scrollbar-color: #222 transparent;
      backdrop-filter: blur(4px);
    }
    #command-suggestions::-webkit-scrollbar { width: 4px; }
    #command-suggestions::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }
    #command-suggestions .suggestions-header {
      padding: 5px 10px 3px;
      color: #444;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1px;
      border-bottom: 1px solid #1a1a2e;
    }
    #command-suggestions .suggestion {
      padding: 6px 10px;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      transition: background 0.1s;
    }
    #command-suggestions .suggestion:hover,
    #command-suggestions .suggestion.active {
      background: color-mix(in srgb, var(--accent-color) 12%, transparent);
      color: #ccc;
    }
    #command-suggestions .suggestion .cmd {
      color: var(--accent-color);
      font-weight: bold;
    }
    #command-suggestions .suggestion.active .cmd { color: #fff; }
    #command-suggestions .suggestion .desc {
      color: #555;
      font-size: 10px;
      text-align: right;
      flex-shrink: 0;
    }
    #command-suggestions .suggestion.active .desc { color: #777; }
  </style>
</head>
<body>
  <div id="game-container"></div>
  <div id="tooltip">
    <div class="tooltip-name"></div>
    <div class="tooltip-detail"></div>
    <div class="tooltip-tool"></div>
    <div class="tooltip-task"></div>
    <div class="tooltip-prompt"></div>
  </div>
  <div id="hud">
    <div class="hud-title">AGENT FACTORY</div>
    <div>Agents: <span class="hud-stat" id="hud-agents">0</span></div>
    <div>Connected: <span class="hud-stat" id="hud-connected">--</span></div>
  </div>
  <script type="module" src="./main.ts"></script>
</body>
</html>
